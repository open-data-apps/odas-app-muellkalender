<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund-Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    <!-- Schatten-Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Optional: Glanz-Overlay oben-links -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="white" fill-opacity="0.07"/>

  <!-- Motiv: Müllkalender -->
  <g filter="url(#shadow)">
    <!-- Mülltonne -->
    <path d="M 160 180 L 352 180 L 332 400 L 180 400 Z" fill="none" stroke="#ffffff" stroke-width="24" stroke-linejoin="round"/>
    <!-- Deckel -->
    <path d="M 140 180 L 372 180" stroke="#ffffff" stroke-width="24" stroke-linecap="round"/>
    <path d="M 216 180 L 216 150 L 296 150 L 296 180" fill="none" stroke="#ffffff" stroke-width="20" stroke-linejoin="round"/>
    <!-- Linien auf der Tonne -->
    <path d="M 216 230 L 216 350" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 256 230 L 256 350" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 296 230 L 296 350" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <!-- Kleines Kalender Icon rechts unten -->
    <rect x="310" y="280" width="80" height="90" rx="8" fill="#ffffff"/>
    <path d="M 310 310 L 390 310" stroke="#3d3fa5" stroke-width="8"/>
    <path d="M 330 270 L 330 290" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <path d="M 370 270 L 370 290" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="350" cy="340" r="12" fill="#3d3fa5"/>
  </g>
</svg>