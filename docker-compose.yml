services:
  oda-app:
    build: .
    ports:
      - "8081:80"
    volumes:
      - ./app:/usr/share/nginx/html/app
      - ./odas-config:/usr/share/nginx/html/odas-config:ro
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./assets:/usr/share/nginx/html/assets
      - ./dist:/usr/share/nginx/html/dist

networks:
  default:
